<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datastar + Bun Test</title>
    <style>
        .loading { opacity: 0.5; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div data-signals="{message: '', count: 0, connectionStatus: ''}">
        
        <!-- Test basic signal binding -->
        <h3>Basic Signal Test:</h3>
        <input data-bind-message placeholder="Type something..." />
        <p>Echo: <span data-text="$message"></span></p>

        <!-- Test computed values -->
        <h3>Computed Value Test:</h3>
        <div data-computed-uppercase="$message.toUpperCase()">
            Uppercase: <span data-text="$uppercase"></span>
        </div>

        <!-- Test SSE connection -->
        <h3>SSE Connection Test:</h3>
        <button 
            data-on-click="@get('/events')"
            data-indicator-loading
        >
            Connect to SSE
        </button>
        <span data-show="$loading">Connecting...</span>
        <span data-show="$connectionStatus === 'connected'" class="success">Connected!</span>
        <span data-show="$connectionStatus === 'error'" class="error">Connection Error!</span>

        <!-- Test signal updates from backend -->
        <h3>Backend Signal Test:</h3>
        <button 
            data-on-click="@post('/signals', {value: $message})"
            data-indicator-sending
            data-attr-disabled="$message === ''"
        >
            Send to Backend
        </button>
        <span data-show="$sending">Sending...</span>

        <!-- Display backend response -->
        <div data-show="$count > 0">
            <p>Backend has processed <span data-text="$count"></span> messages</p>
        </div>

        <!-- Test fragment merging -->
        <h3>Fragment Merging Test:</h3>
        <div id="fragment-container">
            Waiting for fragments...
        </div>
    </div>

    <!-- Load Datastar and initialize monitoring -->
    <script type="module">
        // Import Datastar
        import 'https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-beta.11/bundles/datastar.js';

        // Wait for Datastar to be ready
        window.addEventListener('datastar-ready', () => {
            console.log('Datastar ready');
            
            // Monitor SSE events
            window.addEventListener('datastar-merge-fragments', (e) => {
                console.log('Received fragment:', e.detail);
            });
            
            window.addEventListener('datastar-merge-signals', (e) => {
                console.log('Received signals:', e.detail);
            });

            // Monitor SSE connection state
            const originalGet = window.datastar.get;
            window.datastar.get = function(...args) {
                console.log('SSE Connection attempt:', args);
                const result = originalGet.apply(this, args);
                result.catch(error => {
                    console.error('SSE Connection error:', error);
                    document.querySelector('[data-signals]').setAttribute('data-signals', JSON.stringify({
                        ...JSON.parse(document.querySelector('[data-signals]').getAttribute('data-signals')),
                        connectionStatus: 'error'
                    }));
                });
                return result;
            };
        });

        // Global error handler
        window.addEventListener('error', (e) => {
            console.error('Global error:', e);
            try {
                const signalsEl = document.querySelector('[data-signals]');
                if (signalsEl) {
                    const currentSignals = JSON.parse(signalsEl.getAttribute('data-signals') || '{}');
                    signalsEl.setAttribute('data-signals', JSON.stringify({
                        ...currentSignals,
                        connectionStatus: 'error'
                    }));
                }
            } catch (err) {
                console.error('Error updating connection status:', err);
            }
        });
    </script>
</body>
</html>
